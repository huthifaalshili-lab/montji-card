<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montji Platform</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Poppins:wght@500;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: "Cairo", sans-serif;
      background: radial-gradient(circle at top, #08747a, #003f45 55%, #002f34);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px 15px;
      color: #123;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 38px;
      padding: 32px 24px 0;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.35);
      overflow: hidden;
      border: 1px solid rgba(210,158,82,0.35);
      position: relative;
    }

    .logo {
      width: 210px;
      max-width: 85%;
      margin: 0 auto 15px;
      display: block;
    }

    h1 {
      color: #d39a4f;
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
    }

    .en-title {
      font-family: "Poppins", sans-serif;
      color: #d39a4f;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .desc {
      font-size: 20px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 22px;
    }

    .line {
      width: 70px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00646b, transparent);
      margin: 0 auto 24px;
      border-radius: 20px;
    }

    .contact-box {
      background: linear-gradient(135deg, #004f56, #00727a);
      color: #fff;
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.18);
    }

    .contact-box h2 {
      font-size: 24px;
      margin-bottom: 3px;
    }

    .contact-box p {
      color: #d39a4f;
      font-size: 17px;
      font-weight: 700;
    }

    .btn {
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 15px;
      width: 100%;
      background: #fff;
      color: #004f56;
      border-radius: 18px;
      padding: 17px 20px;
      margin-bottom: 15px;
      font-size: 20px;
      font-weight: 800;
      box-shadow: 0 10px 25px rgba(0,0,0,0.13);
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-3px);
    }

    .btn.gold {
      background: linear-gradient(135deg, #c98d3f, #dfa85c);
      color: #fff;
    }

    .icon {
      font-size: 27px;
    }

    .follow {
      margin-top: 26px;
      font-size: 25px;
      font-weight: 800;
      color: #333;
      position: relative;
    }

    .insta {
      margin: 18px auto 28px;
      width: 74px;
      height: 74px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00646b;
      font-size: 34px;
      text-decoration: none;
    }

    .instagram-text {
      color: #00646b;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      margin-top: -18px;
      margin-bottom: 25px;
      font-size: 18px;
    }

    .footer {
      background: linear-gradient(135deg, #004f56, #00666d);
      color: #fff;
      margin: 0 -24px;
      padding: 35px 15px 28px;
      border-radius: 45% 45% 0 0 / 20% 20% 0 0;
      font-size: 18px;
      font-weight: 700;
    }

    .heart {
      color: #d39a4f;
      font-size: 28px;
      display: block;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="logo.png" alt="Montji Logo" class="logo">

    <h1>منصة مُنتجي</h1>
    <div class="en-title">Montji Platform</div>

    <p class="desc">
      منصة تجمع المنتجات العُمانية<br>
      وتدعم رواد الأعمال المحليين
    </p>

    <div class="line"></div>

    <div class="contact-box">
      <h2>للتواصل والاستفسار</h2>
      <p>نحن هنا لخدمتكم</p>
    </div>

    <a class="btn gold" href="https://saidalhosni.github.io/MontjiPlus/" target="_blank">
      <span class="icon">🌐</span>
      <span>استكشف المنصة</span>
      <span>›</span>
    </a>

    <div class="follow">تابعنا على</div>

    <a class="insta" href="https://www.instagram.com/montji_?igsh=MXVoNTZkbDN0MTFwag==" target="_blank">
      ⌾
    </a>

    <div class="instagram-text">Instagram</div>

    <div class="footer">
      <span class="heart">♡</span>
      شكرًا لدعمكم المنتجات العُمانية
    </div>

  </div>

</body>
</html>
